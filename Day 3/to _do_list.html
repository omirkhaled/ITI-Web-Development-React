<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To Do List</title>
</head>
<body>

    <h1>My To Do List</h1>

    <input id="task" placeholder="Add a new task...">
    <button onclick="list.innerHTML += '<li>' + task.value + ' <button onclick=this.parentElement.remove()>Remove</button></li>'; task.value=''">Add</button>

    <ul id="list"></ul>
    
</body>
</html>
