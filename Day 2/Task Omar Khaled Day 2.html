<!DOCTYPE html> 
<!-- // HTML Version ==5 -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omareto Khaled Italian Pizza</title>
</head>

<body>
        <nav>
            <a href="#">Main</a>
            <a href="#">Make an Order</a>
            <a href="#">Contact Us</a>
        </nav>
        
        <h1>Omareto Khaled Italian Pizza</h1>

        <p> <strong>Pizza! Pizza!</strong> Life is too short to skip pizza. </p>

    <form>

        <fieldset>
            <legend>Your Personal Info</legend>
            <p>
                <label for="name">Name : </label>
                <input type="text" id="name" name="customer_name">
            </p>
            <p>
                <label for="address">Address : </label>
                <input type="text" id="address" name="customer address">
            </p>
            <p>
                <label for="phone">Telephone Number : </label>
                <input type="text" id="phone" name="customer phone">
            </p>
            <p>
                <label for="email">Email : </label>
                <input type="text" id="email" name="customer email">
            </p>
            <p>
                <label for="instructions">Delivery Instruction : </label>
                <br>
                <textarea id="instructions" name="delivery instructions" rows="4" cols="40">No more than 400 character long </textarea>
            </p>
        </fieldset>

        <h2> Design your <strong>Favorite</strong>!Pizza</h2>
        <fieldset>
            <legend>Pizza specs</legend>
            <fieldset>
                <!-- // Radio Button -->
                <legend>Crust Choose Only One:</legend> 
            <p>
                    <input type="radio" id="white" name="crust" value="classic white">
                    <label for="white">Classic White</label><br>
                    
                    <input type="radio" id="multigrain" name="crust" value="multigrain">
                    <label for="multigrain">Multigrain</label><br>
                    
                    <input type="radio" id="stuffed" name="crust" value="stuffed crust">
                    <label for="stuffed">stuffed crust</label><br>
                    
                    <input type="radio" id="gluten free" name="crust" value="gluten free">
                    <label for="gluten_free">Gluten free</label><br>
            </p>
            </fieldset>

            <fieldset>
                <!-- // checkbox -->
                <legend>Choose your toppings as you wants</legend> 
                <p>
                    <input type="checkbox" id="red_sauce" name="toppings" value="red_sauce">
                    <label for="red_sauce">Red Sauce</label><br>
                    
                    <input type="checkbox" id="white_sauce" name="toppings" value="white_sauce">
                    <label for="white_sauce">White Sauce</label><br>
                    
                    <input type="checkbox" id="mozzarella" name="toppings" value="mozzarella">
                    <label for="mozzarella">Mozzarella Cheese</label><br>
                    
                    <input type="checkbox" id="pepperoni" name="toppings" value="pepperoni">
                    <label for="pepperoni">Pepperoni</label><br>
                    
                    <input type="checkbox" id="mushrooms" name="toppings" value="mushrooms">
                    <label for="mushrooms">Mushrooms</label><br>
                    
                    <input type="checkbox" id="peppers" name="toppings" value="peppers">
                    <label for="peppers">Peppers</label><br>
                </p>
            <fieldset>
                <legend>Number Of Pizza you wants</legend>
                <p>
                    <label for="quantity">How many pizzas:</label>
                    <input type="text" id="quantity" name="pizza_quantity" size="4">
                </p>
            </fieldset>
        </fieldset>
                    <br>
                    <input type="submit" value="Pizza! Pizza! Pizza!">
                    <input type="reset" value="Reset">

    </form>

</body>
</html>
